services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://optidx.syreon.me
    ports:
      - "127.0.0.1:8082:8082"
    volumes:
      - optidx-storage:/var/www/html/storage
      - optidx-database:/var/www/html/database
      - ../optidx_package:/var/www/optidx_package:ro
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://optidx.syreon.me
      RUN_MIGRATIONS: "0"
    command: ["php", "artisan", "queue:work", "--tries=1", "--timeout=0"]
    volumes:
      - optidx-storage:/var/www/html/storage
      - optidx-database:/var/www/html/database
      - ../optidx_package:/var/www/optidx_package:ro
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://optidx.syreon.me
      RUN_MIGRATIONS: "0"
    command: ["sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    volumes:
      - optidx-storage:/var/www/html/storage
      - optidx-database:/var/www/html/database
      - ../optidx_package:/var/www/optidx_package:ro
    restart: unless-stopped

volumes:
  optidx-storage:
  optidx-database:
