                - paragraph [ref=e837]: "Under a prevalence of 8% in the target community, the proposed three-step pathway (WHO-4 symptom screening → CAD4TB chest X-ray → Xpert MTB/RIF Ultra) achieves an aggregate sensitivity of 84.2% and specificity of 94.6%, at an expected cost of $5.62 per patient screened. Mean turnaround is 2.8 hours. The pathway is feasible under the declared operational constraints with one warning: aggregate sensitivity falls 0.8 pp below the user-defined minimum of 85%."
